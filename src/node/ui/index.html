<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AttestP2P — nœud</title>
<link rel="icon" type="image/png" href="/ui/favicon.png">
<link rel="apple-touch-icon" href="/ui/icon.svg">
<style>
 :root{--bg:#0f1720;--card:#111c2b;--line:#22303f;--fg:#e5e9f0;--mut:#8fb3ff;--accent:#2b6cff}
 *{box-sizing:border-box}
 body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;background:var(--bg);color:var(--fg)}
 header{padding:14px 20px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
 header h1{font-size:16px;margin:0} .id{font-family:ui-monospace,monospace;font-size:11px;color:#7d8ca0}
 .badges{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
 .badge{font-size:11px;background:#0b131c;border:1px solid var(--line);padding:3px 8px;border-radius:20px}
 .badge b{color:var(--mut)}
 nav{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--line);background:#0d1622}
 nav button{background:transparent;color:#9fb0c3;border:0;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}
 nav button.on{background:var(--accent);color:#fff}
 main{padding:16px;max-width:900px;margin:0 auto}
 .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
 .card h2{font-size:12px;margin:0 0 10px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
 input,button,select{font-family:inherit;font-size:13px}
 input,select{background:#0b131c;border:1px solid #2a3a4d;color:var(--fg);padding:8px;border-radius:8px}
 button.act{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
 button.ghost{background:#0b131c;border:1px solid #2a3a4d;color:#cfe0ff;padding:6px 10px;border-radius:8px;cursor:pointer}
 .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
 .mono{font-family:ui-monospace,monospace;font-size:12px}
 .peer{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1b2836}
 .peer:last-child{border-bottom:0}
 .tag{font-size:10px;padding:1px 6px;border-radius:5px;background:#22303f}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
 .stat{background:#0b131c;border:1px solid var(--line);border-radius:10px;padding:10px}
 .stat .k{font-size:11px;color:#7d8ca0} .stat .v{font-size:20px;font-weight:600}
 .thread{background:#0b131c;border:1px solid var(--line);border-radius:10px;padding:10px;max-height:320px;overflow:auto;display:flex;flex-direction:column;gap:6px}
 .msg{padding:6px 10px;border-radius:10px;max-width:80%;font-size:13px;word-break:break-word}
 .msg.out{align-self:flex-end;background:#1e3a8a}
 .msg.in{align-self:flex-start;background:#1b2836}
 .msg.ai{align-self:flex-start;background:#14352a;border:1px solid #1f6f4d}
 .muted{color:#7d8ca0;font-size:12px}
 a{color:var(--mut)}
 .logo{vertical-align:-4px;margin-right:4px}
 .f1{flex:1}.mla{margin-left:auto}.mb10{margin-bottom:10px}
 .mt6{margin-top:6px}.mt10{margin-top:10px}.mt12{margin-top:12px}
</style>
</head>
<body>
<div id="root"></div>
<script src="/ui/vendor/react.js"></script>
<script src="/ui/vendor/react-dom.js"></script>
<script src="/ui/vendor/htm.js"></script>
<script src="/ui/app.js"></script>
</body>
</html>
